<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nightfall // asymmetric horror demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="game"></canvas>

  <!-- Lobby: join row first, then roster + start once joined -->
  <div id="lobby">
    <div class="panel">
      <h1 class="title">NIGHTFALL</h1>
      <p class="tagline">One hunts. The rest survive.</p>

      <div id="joinRow">
        <input id="nameInput" type="text" maxlength="16" placeholder="Your name" autocomplete="off">
        <button id="joinBtn">Join</button>
      </div>

      <div id="rosterBox">
        <p class="rosterLabel">Players in lobby</p>
        <ul id="playerList"></ul>
        <button id="startBtn">Start match</button>
        <p id="hostNote"></p>
      </div>
    </div>
  </div>

  <!-- Top status bar during a match -->
  <div id="hud"></div>

  <!-- Center banner for round transitions and results -->
  <div id="banner"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
